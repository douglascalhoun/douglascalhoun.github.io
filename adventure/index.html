<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Tile Adventure</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #1a1a2e;
            overflow: hidden;
            touch-action: none;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
            font-family: 'Courier New', monospace;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        #game-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            padding: 20px;
        }
        #game-canvas {
            border: 4px solid #16213e;
            border-radius: 8px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
            background: #0f3460;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
        }
        #info {
            color: #eee;
            text-align: center;
            padding: 15px;
            background: rgba(22, 33, 62, 0.8);
            border-radius: 8px;
            max-width: 90vw;
        }
        #info h1 {
            font-size: 24px;
            margin-bottom: 10px;
            color: #e94560;
        }
        #info p {
            font-size: 14px;
            line-height: 1.6;
        }
        #controls {
            display: grid;
            grid-template-columns: repeat(3, 70px);
            grid-template-rows: repeat(3, 70px);
            gap: 5px;
            margin-top: 10px;
        }
        .control-btn {
            background: #16213e;
            border: 2px solid #e94560;
            border-radius: 8px;
            color: #eee;
            font-size: 24px;
            cursor: pointer;
            user-select: none;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            touch-action: manipulation;
        }
        .control-btn:active {
            background: #e94560;
            transform: scale(0.95);
        }
        .control-btn.empty {
            opacity: 0;
            pointer-events: none;
        }
        #stats {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin-top: 10px;
        }
        .stat {
            background: #16213e;
            padding: 8px 16px;
            border-radius: 6px;
            border: 2px solid #0f3460;
        }
        .stat-label {
            color: #e94560;
            font-size: 12px;
        }
        .stat-value {
            color: #eee;
            font-size: 16px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div id="game-container">
        <div id="info">
            <h1>🗺️ Tile Adventure</h1>
            <p>Swipe or tap the arrows to move your adventurer!</p>
            <div id="stats">
                <div class="stat">
                    <div class="stat-label">Moves</div>
                    <div class="stat-value" id="moves">0</div>
                </div>
                <div class="stat">
                    <div class="stat-label">Treasures</div>
                    <div class="stat-value" id="treasures">0 / 5</div>
                </div>
            </div>
        </div>
        <canvas id="game-canvas"></canvas>
        <div id="controls">
            <div class="control-btn empty"></div>
            <div class="control-btn" data-dir="up">▲</div>
            <div class="control-btn empty"></div>
            <div class="control-btn" data-dir="left">◄</div>
            <div class="control-btn empty"></div>
            <div class="control-btn" data-dir="right">►</div>
            <div class="control-btn empty"></div>
            <div class="control-btn" data-dir="down">▼</div>
            <div class="control-btn empty"></div>
        </div>
    </div>
    <script type="module" src="./game.js"></script>
</body>
</html>
