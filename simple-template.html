<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>House Jams - Guitar Chords</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: monospace;
  display: flex;
  height: 100vh;
}

nav {
  width: 250px;
  background: #f5f5f5;
  padding: 20px;
  overflow-y: auto;
  border-right: 2px solid #ddd;
  position: fixed;
  height: 100vh;
}

nav h1 {
  font-size: 18px;
  margin-bottom: 20px;
}

nav a {
  display: block;
  padding: 5px 0;
  color: #333;
  text-decoration: none;
}

nav a:hover {
  text-decoration: underline;
}

main {
  margin-left: 250px;
  padding: 40px;
  flex: 1;
}

.song {
  margin-bottom: 60px;
  padding-bottom: 40px;
  border-bottom: 2px solid #ddd;
}

.song h2 {
  font-size: 24px;
  margin-bottom: 20px;
}

.song pre {
  font-family: monospace;
  line-height: 1.6;
  white-space: pre-wrap;
}
</style>
</head>
<body>
<nav>
<h1>House Jams</h1>
</nav>
<main></main>

<script>
// Parse songs from template and build simplified page
const template = document.querySelector('template').innerHTML;
const songs = template.split('---\n');
const nav = document.querySelector('nav');
const main = document.querySelector('main');

songs.forEach(song => {
  if (!song.trim()) return;
  
  const lines = song.trim().split('\n');
  const title = lines[0].trim();
  const content = lines.slice(1).join('\n').trim();
  const id = title.toLowerCase().replace(/[^a-z0-9]+/g, '-');
  
  // Add nav link
  const link = document.createElement('a');
  link.href = '#' + id;
  link.textContent = title;
  nav.appendChild(link);
  
  // Add song content
  const songDiv = document.createElement('div');
  songDiv.className = 'song';
  songDiv.id = id;
  
  const h2 = document.createElement('h2');
  h2.textContent = title;
  songDiv.appendChild(h2);
  
  const pre = document.createElement('pre');
  pre.textContent = content;
  songDiv.appendChild(pre);
  
  main.appendChild(songDiv);
});
</script>

<!-- Original song data preserved below -->
<template>SONG_DATA_PLACEHOLDER</template>

</body>
</html>
